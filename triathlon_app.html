<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training OS">
<meta name="theme-color" content="#1a1a1a">
<title>Training OS — Half Ironman Plan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f0efea;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0e0d8;--radius:12px;
  --run:#3B6D11;--run-bg:#EAF3DE;
  --swim:#185FA5;--swim-bg:#E6F1FB;
  --bike:#854F0B;--bike-bg:#FAEEDA;
  --brick:#993556;--brick-bg:#FBEAF0;
  --gym:#3C3489;--gym-bg:#EEEDFE;
  --rehab:#085041;--rehab-bg:#E1F5EE;
  --rest:#444441;--rest-bg:#F1EFE8;
  --race:#993C1D;--race-bg:#F0997B;
  --accent:#1a1a1a;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:env(safe-area-inset-top,12px)}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.topbar .sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar .badge{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}

/* WEEK TABS */
.week-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;scrollbar-width:none}
.week-tabs::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.wtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 100px}

/* WEEK HEADER */
.wk-header{border-radius:10px;padding:10px 14px;margin-bottom:10px}
.wk-header h2{font-size:14px;font-weight:600;color:#fff}
.wk-header p{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;line-height:1.5}

/* DAY CARD */
.day-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.day-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.day-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:20px;flex-shrink:0}
.day-info{flex:1}
.day-name{font-size:13px;font-weight:600}
.day-subtitle{font-size:11px;color:var(--text3);margin-top:1px}
.day-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.day-check.done{background:#1D9E75;border-color:#1D9E75}
.day-check svg{display:none}
.day-check.done svg{display:block}
.day-chevron{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.day-chevron.open{transform:rotate(180deg)}

/* DAY BODY */
.day-body{display:none;padding:0 14px 12px;border-top:0.5px solid var(--border)}
.day-body.open{display:block}
.section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:10px 0 5px}
.line{font-size:12px;line-height:1.6;color:var(--text2);padding:2px 0}
.ex-item{font-size:11.5px;line-height:1.6;color:var(--text2);padding:2px 0 2px 12px;position:relative}
.ex-item:before{content:"·";position:absolute;left:2px;color:var(--text3)}

/* NOTES */
.notes-area{width:100%;margin-top:10px;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--surface2);resize:none;min-height:60px;outline:none}
.notes-area:focus{border-color:#1D9E75}
.save-btn{display:block;width:100%;margin-top:6px;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center}
.saved-hint{font-size:10px;color:#1D9E75;text-align:center;margin-top:4px;height:14px}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:100}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;cursor:pointer;gap:3px}
.bnav-icon{font-size:22px}
.bnav-label{font-size:10px;color:var(--text3)}
.bnav-item.active .bnav-label{color:var(--accent);font-weight:600}

/* PROGRESS VIEW */
.prog-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.prog-title{font-size:13px;font-weight:600;margin-bottom:8px}
.prog-bar-wrap{background:var(--surface2);border-radius:20px;height:8px;margin-bottom:4px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;background:#1D9E75;transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px}
.stat-val{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* NOTES VIEW */
.note-entry{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.note-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-day{font-size:12px;font-weight:600}
.note-date{font-size:10px;color:var(--text3)}
.note-text{font-size:12px;color:var(--text2);line-height:1.6}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;line-height:1.6}

/* COLORS */
.tag-run{background:var(--run-bg);color:var(--run)}
.tag-swim{background:var(--swim-bg);color:var(--swim)}
.tag-bike{background:var(--bike-bg);color:var(--bike)}
.tag-brick{background:var(--brick-bg);color:var(--brick)}
.tag-gym{background:var(--gym-bg);color:var(--gym)}
.tag-rehab{background:var(--rehab-bg);color:var(--rehab)}
.tag-rest{background:var(--rest-bg);color:var(--rest)}
.tag-race{background:var(--race-bg);color:var(--race)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <h1>Training OS</h1>
      <div class="sub">Half Ironman · Aug 16</div>
    </div>
    <div class="badge" id="progress-badge">0%</div>
  </div>

  <!-- PLAN VIEW -->
  <div id="view-plan" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="week-tabs" id="week-tabs"></div>
    <div class="scroll" id="day-list"></div>
  </div>

  <!-- PROGRESS VIEW -->
  <div id="view-progress" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="scroll">
      <div class="stat-grid" id="stat-grid"></div>
      <div id="prog-weeks"></div>
    </div>
  </div>

  <!-- NOTES VIEW -->
  <div id="view-notes" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="scroll" id="notes-list"></div>
  </div>

  <nav class="bottomnav">
    <div class="bnav-item active" onclick="switchView('plan',this)" id="nav-plan">
      <div class="bnav-icon">📋</div>
      <div class="bnav-label">Plan</div>
    </div>
    <div class="bnav-item" onclick="switchView('progress',this)" id="nav-progress">
      <div class="bnav-icon">📈</div>
      <div class="bnav-label">Progress</div>
    </div>
    <div class="bnav-item" onclick="switchView('notes',this)" id="nav-notes">
      <div class="bnav-icon">📝</div>
      <div class="bnav-label">Notes</div>
    </div>
  </nav>
</div>

  days:[

    {t:'gym',day:'Tuesday',sub:'Bike AM + Gym activation',lines:['AM: 75 min — 3x10 min Z3-Z4 to stay sharp','PM: Gym — lower body activation only'],exLbl:'Gym exercises',ex:TUE_TAP},
    {t:'run',day:'Wednesday',sub:'Controlled run + Gym',lines:['AM: 45 min — 20 WU, 2x10 min Z3, 15 CD','PM: Gym — upper activation + face pulls + hip mob'],exLbl:'Gym exercises',ex:WED_TAP},
    {t:'brick',day:'Thursday',sub:'Last big brick',lines:['75 min bike Z3 + 20 min easy run Z2.','Last significant brick. Hip mobility after.'],exLbl:null,ex:null},
    {t:'gym',day:'Friday',sub:'Easy run + Gym activation',lines:['AM: 30 min easy Z1-Z2.','PM: Gym — activation only, no fatigue'],exLbl:'Gym exercises',ex:FRI_TAP},
    {t:'swim',day:'Saturday',sub:'Easy run AM + Swim PM',lines:['AM: 35 min easy Z2','PM: 1,900m — race pace. Feel how easy it is now.'],exLbl:null,ex:null},
    {t:'swim',day:'Sunday',sub:'Swim AM + Easy bike PM',lines:['AM: 1,500m','PM: 2 hrs bike (70km). Easy Z2.'],exLbl:null,ex:null},
  ]},
  {id:'w17',label:'Wk 17',title:'Final tune-up — volume -60%',vol:'~6 hrs',color:'#185FA5',note:'Short sharp sessions only. Sluggishness is normal taper fatigue. Do not add extra sessions.',noteType:'warn',
  days:[
    {t:'rest',day:'Monday',sub:'Full rest + hip mobility',lines:['No training. Hip mobility 15 min.'],exLbl:'Hip mobility',ex:HIP},
    {t:'gym',day:'Tuesday',sub:'Bike AM + Gym',lines:['AM: 55 min — 4x5 min Z4 to wake up legs','PM: Gym — minimal activation'],exLbl:'Gym exercises',ex:TUE_TAP},
    {t:'run',day:'Wednesday',sub:'Sharp run + Final gym',lines:['AM: 35 min — 5x1km at 5K pace, full jog recovery','PM: Gym — final upper session'],exLbl:'Gym exercises',ex:WED_TAP},
    {t:'brick',day:'Thursday',sub:'Final brick + Last gym',lines:['45 min bike + 15 min easy run.','LAST BRICK AND LAST GYM SESSION of the plan.'],exLbl:'Final gym',ex:GYM_LAST},
    {t:'rest',day:'Friday',sub:'Very easy + strides',lines:['20 min very easy jog + 4x15s strides. That is all.','Hip mobility 15 min.'],exLbl:null,ex:null},
    {t:'swim',day:'Saturday',sub:'Very easy run + Short swim',lines:['AM: 15 min very easy jog','PM: 1,000m easy + 4x50m race pace. Relaxed.'],exLbl:null,ex:null},
    {t:'swim',day:'Sunday',sub:'Easy swim + Final spin',lines:['AM: 800m easy','PM: 50 min easy spin. Last training before race week.'],exLbl:null,ex:null},
  ]},
  {id:'w18',label:'Race week',title:'Race week — August 16th',vol:'~2 hrs + RACE',color:'#993C1D',note:'NO GYM this week. No fatigue. No soreness. Hip mobility 10-15 min daily, gentle. You are ready.',noteType:'warn',
  days:[
    {t:'rest',day:'Monday',sub:'Full rest',lines:['No training.','Hip mobility 10 min gentle.'],exLbl:null,ex:null},
    {t:'bike',day:'Tuesday',sub:'Short bike activation',lines:['25 min easy + 3x1 min race effort to fire muscles.'],exLbl:null,ex:null},
    {t:'run',day:'Wednesday',sub:'Very short run',lines:['20 min very easy + 3 strides.','Hip should feel completely fine.'],exLbl:null,ex:null},
    {t:'rest',day:'Thursday',sub:'Rest / Travel',lines:['Rest or travel. Optional 15 min easy spin on arrival.','Hip mobility 10 min gentle.'],exLbl:null,ex:null},
    {t:'swim',day:'Friday',sub:'Venue prep + Swim',lines:['15 min easy jog at race venue.','15 min swim in race water.','Walk T1/T2. Check all gear. Sleep by 9pm.'],exLbl:null,ex:null},
    {t:'rest',day:'Saturday',sub:'Race preparation',lines:['Bike racking. Walk transition zones.','Eat well — familiar foods only.','Hip mobility 10 min. Sleep by 9pm.'],exLbl:null,ex:null},
    {t:'race',day:'Sunday — RACE DAY',sub:'August 16th 🏊🚴🏃',lines:['Leg swings + hip circles before water entry.','Swim 1.9km → Bike 90km → Run 21km.','Run: start easy — hip loosens by km 3.','Walk every aid station. You are ready.'],exLbl:null,ex:null},
  ]},
];

// STATE
let state={currentWeek:0,done:{},notes:{}};
try{const s=localStorage.getItem('trios');if(s)state=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('trios',JSON.stringify(state));}catch(e){}}
function sessionKey(wi,di){return wi+'-'+di;}

// TOTAL SESSIONS (excluding rest days)
function totalSessions(){let n=0;WEEKS.forEach((w,wi)=>w.days.forEach((d,di)=>{if(d.t!=='rest')n++;}));return n;}
function doneSessions(){return Object.keys(state.done).filter(k=>state.done[k]).length;}

// BUILD TABS
const tabsEl=document.getElementById('week-tabs');
WEEKS.forEach((w,i)=>{
  const btn=document.createElement('button');
  btn.className='wtab'+(i===state.currentWeek?' active':'');
  btn.textContent=w.label;
  btn.onclick=()=>{state.currentWeek=i;save();renderWeek();tabsEl.querySelectorAll('.wtab').forEach((t,j)=>t.classList.toggle('active',j===i));};
  tabsEl.appendChild(btn);
});

function renderWeek(){
  const wk=WEEKS[state.currentWeek];
  const list=document.getElementById('day-list');
  list.innerHTML='';

  // banner
  const banner=document.createElement('div');
  banner.className='wk-header';
  banner.style.background=wk.color;
  banner.innerHTML=`<h2>${wk.title} <span style="font-size:11px;font-weight:400;opacity:.8">${wk.vol}</span></h2><p>${wk.note}</p>`;
  list.appendChild(banner);

  wk.days.forEach((day,di)=>{
    const key=sessionKey(state.currentWeek,di);
    const isDone=!!state.done[key];
    const noteVal=state.notes[key]||'';

    const card=document.createElement('div');
    card.className='day-card';

    const hdr=document.createElement('div');
    hdr.className='day-hdr';
    hdr.innerHTML=`
      <span class="day-tag tag-${day.t}">${day.t}</span>
      <div class="day-info">
        <div class="day-name">${day.day}</div>
        <div class="day-subtitle">${day.sub}</div>
      </div>
      ${day.t!=='rest'?`<div class="day-check ${isDone?'done':''}" id="chk-${key}" onclick="toggleDone('${key}',event)">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`:''}
      <div class="day-chevron" id="chv-${key}">▾</div>
    `;
    hdr.onclick=(e)=>{
      if(e.target.closest('.day-check'))return;
      const body=document.getElementById('body-'+key);
      const chv=document.getElementById('chv-'+key);
      const open=body.classList.contains('open');
      body.classList.toggle('open',!open);
      chv.classList.toggle('open',!open);
    };
    card.appendChild(hdr);

    const body=document.createElement('div');
    body.className='day-body';
    body.id='body-'+key;

    if(day.lines.length){
      const sl=document.createElement('div');sl.className='section-lbl';sl.textContent='Session';body.appendChild(sl);
      day.lines.forEach(l=>{const d=document.createElement('div');d.className='line';d.textContent=l;body.appendChild(d);});
    }
    if(day.ex&&day.ex.length){
      const sl=document.createElement('div');sl.className='section-lbl';sl.textContent=day.exLbl||'Exercises';body.appendChild(sl);
      day.ex.forEach(e=>{const d=document.createElement('div');d.className='ex-item';d.textContent=e;body.appendChild(d);});
    }

    // notes
    const nl=document.createElement('div');nl.className='section-lbl';nl.textContent='My notes';body.appendChild(nl);
    const ta=document.createElement('textarea');
    ta.className='notes-area';ta.placeholder='How did this session go? Any pain, times, feelings...';
    ta.value=noteVal;ta.rows=3;
    body.appendChild(ta);
    const sb=document.createElement('button');sb.className='save-btn';sb.textContent='Save note';
    const sh=document.createElement('div');sh.className='saved-hint';sh.id='hint-'+key;
    sb.onclick=()=>{state.notes[key]=ta.value;save();sh.textContent='Saved ✓';setTimeout(()=>sh.textContent='',2000);renderNotes();};
    body.appendChild(sb);body.appendChild(sh);

    card.appendChild(body);
    list.appendChild(card);
  });
  updateBadge();
}

function toggleDone(key,e){
  e.stopPropagation();
  state.done[key]=!state.done[key];
  save();
  const el=document.getElementById('chk-'+key);
  if(el)el.className='day-check'+(state.done[key]?' done':'');
  updateBadge();
  renderProgress();
}

function updateBadge(){
  const pct=totalSessions()>0?Math.round(doneSessions()/totalSessions()*100):0;
  document.getElementById('progress-badge').textContent=pct+'%';
}

// PROGRESS
function renderProgress(){
  const tot=totalSessions(),done=doneSessions(),pct=tot>0?Math.round(done/tot*100):0;
  const sg=document.getElementById('stat-grid');
  sg.innerHTML=`
    <div class="stat-box"><div class="stat-val">${done}</div><div class="stat-lbl">Sessions done</div></div>
    <div class="stat-box"><div class="stat-val">${tot-done}</div><div class="stat-lbl">Sessions left</div></div>
    <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Plan complete</div></div>
    <div class="stat-box"><div class="stat-val">${Object.keys(state.notes).filter(k=>state.notes[k]).length}</div><div class="stat-lbl">Notes logged</div></div>
  `;
  const pw=document.getElementById('prog-weeks');
  pw.innerHTML='';
  WEEKS.forEach((wk,wi)=>{
    const wDays=wk.days.filter(d=>d.t!=='rest');
    const wDone=wDays.filter((d,di)=>{
      const actualDi=wk.days.indexOf(d);
      return !!state.done[sessionKey(wi,actualDi)];
    }).length;
    const wPct=wDays.length>0?Math.round(wDone/wDays.length*100):0;
    const pc=document.createElement('div');pc.className='prog-card';
    pc.innerHTML=`
      <div class="prog-title">${wk.label} — ${wk.title}</div>
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${wPct}%;background:${wk.color}"></div></div>
      <div class="prog-meta"><span>${wDone}/${wDays.length} sessions</span><span>${wPct}%</span></div>
    `;
    pw.appendChild(pc);
  });
}

// NOTES
function renderNotes(){
  const nl=document.getElementById('notes-list');
  nl.innerHTML='';
  const entries=[];
  WEEKS.forEach((wk,wi)=>wk.days.forEach((day,di)=>{
    const key=sessionKey(wi,di);
    if(state.notes[key])entries.push({key,wk,day,wi,di,note:state.notes[key]});
  }));
  if(!entries.length){nl.innerHTML='<div class="empty-state">No notes yet.<br>Complete a session and add your thoughts.</div>';return;}
  entries.forEach(e=>{
    const c=document.createElement('div');c.className='note-entry';
    c.innerHTML=`
      <div class="note-head">
        <div class="note-day"><span class="day-tag tag-${e.day.t}" style="font-size:9px;margin-right:6px">${e.day.t}</span>${e.wk.label} · ${e.day.day}</div>
      </div>
      <div class="note-text">${e.note}</div>
    `;
    nl.appendChild(c);
  });
}

// VIEW SWITCHING
function switchView(view,btn){
  document.querySelectorAll('[id^="view-"]').forEach(v=>v.style.display='none');
  document.getElementById('view-'+view).style.display='flex';
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(view==='progress')renderProgress();
  if(view==='notes')renderNotes();
}

renderWeek();
updateBadge();
</script>
</body>
</html>
